<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pensjonskompasset — Beregningsoppsummering</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --g:    #1a5c3a; --g2: #2d7a52; --g-lt: #e6f2ec;
  --bg:   #f4f1eb; --wh: #ffffff;
  --txt:  #111827; --muted: #6b7280; --bdr: #e2ddd6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}

header{background:var(--g);color:#fff;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.logo{font-family:'Instrument Serif',serif;font-size:1.3rem;}
.logo-sub{font-size:.58rem;opacity:.55;letter-spacing:.09em;text-transform:uppercase;margin-top:1px;}
.reset-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-family:'Syne',sans-serif;font-size:.7rem;padding:6px 14px;border-radius:6px;cursor:pointer;}
.reset-btn:hover{background:rgba(255,255,255,.22);}

#outer{max-width:760px;margin:0 auto;padding:36px 32px 80px;}

.sec-lbl{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bdr);}

/* PROFIL */
.profil-grid{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
.pfelt{flex:1;min-width:140px;}
.pfelt label{display:block;font-size:.7rem;font-weight:700;margin-bottom:5px;}
.pfelt select,.pfelt input[type="text"]{width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:600;color:var(--txt);background:var(--bg);}
.pfelt select:focus,.pfelt input[type="text"]:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px var(--g-lt);}

/* TABS */
.tab-row{display:flex;border-bottom:2px solid var(--bdr);}
.tab-btn{padding:10px 22px;border:none;background:transparent;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover{color:var(--g);}
.tab-btn.active{color:var(--g);border-bottom-color:var(--g);}
.tab-dot{width:7px;height:7px;border-radius:50%;background:var(--bdr);flex-shrink:0;transition:background .15s;}
.tab-btn.active .tab-dot,.tab-btn.has-data .tab-dot{background:var(--g);}

/* ALT PANEL */
.alt-panel{display:none;background:var(--wh);border:1.5px solid var(--bdr);border-top:none;border-radius:0 0 12px 12px;padding:24px 28px;margin-bottom:20px;}
.alt-panel.active{display:block;}

.alt-name-row{margin-bottom:16px;}
.alt-name-row label{font-size:.7rem;font-weight:700;display:block;margin-bottom:5px;}
.alt-name-row input{width:100%;padding:8px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:600;background:var(--bg);color:var(--txt);}
.alt-name-row input:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px var(--g-lt);}

/* FIELD ROW */
.field-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr);}
.field-row:last-child{border-bottom:none;}
.field-lbl{flex:1;font-size:.82rem;font-weight:500;}
.field-hint{font-size:.68rem;color:var(--muted);margin-top:2px;}
.field-input-wrap{display:flex;align-items:center;gap:7px;}
.num-input{width:130px;padding:8px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:600;color:var(--txt);background:var(--bg);text-align:right;-moz-appearance:textfield;}
.num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.num-input:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px var(--g-lt);background:var(--wh);}
.txt-input{width:100px;padding:8px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:600;background:var(--bg);color:var(--txt);}
.txt-input:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px var(--g-lt);}
.field-unit{font-size:.72rem;color:var(--muted);white-space:nowrap;}
.field-toggle{display:flex;gap:6px;}
.toggle-btn{padding:6px 12px;border:1.5px solid var(--bdr);border-radius:6px;background:var(--bg);font-family:'Syne',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--muted);}
.toggle-btn.active-ja {background:var(--g-lt);border-color:var(--g);color:var(--g);}
.toggle-btn.active-nei{background:#fef2f2;border-color:#fca5a5;color:#b91c1c;}

/* TOTAL */
.total-row{display:flex;align-items:center;gap:12px;padding:12px 0 0;margin-top:8px;border-top:2px solid var(--bdr);}
.total-lbl{flex:1;font-size:.85rem;font-weight:700;color:var(--g);}
.total-val{font-size:1.05rem;font-weight:700;color:var(--g);}

/* GEN BTN */
.gen-btn{background:var(--g);color:#fff;border:none;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;padding:13px 26px;border-radius:9px;cursor:pointer;margin-top:8px;width:100%;}
.gen-btn:hover{background:var(--g2);}

/* EPOST */
#epost-section{margin-top:32px;display:none;}
.epost-box{background:var(--wh);border:2px solid var(--g);border-radius:12px;overflow:hidden;}
.epost-header{background:var(--g);color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;}
.epost-header-title{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.copy-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:600;padding:6px 14px;border-radius:6px;cursor:pointer;}
.copy-btn:hover{background:rgba(255,255,255,.3);}
.epost-body{padding:24px 28px;font-size:11px;line-height:1.9;color:var(--txt);font-family:'Segoe UI',sans-serif;}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Pensjonskompasset</div>
    <div class="logo-sub">Beregningsoppsummering</div>
  </div>
  <button class="reset-btn" onclick="nullstill()">↺ Nullstill</button>
</header>

<div id="outer">

  <div class="sec-lbl">Profil</div>
  <div class="profil-grid">
    <div class="pfelt"><label>Fornavn</label><input type="text" id="fornavn" placeholder="F.eks. Kari"></div>
    <div class="pfelt">
      <label>Fødselsår</label>
      <select id="aar">
        <option value="">Velg år</option>
        <option>1963</option><option>1964</option><option>1965</option><option>1966</option>
        <option>1967</option><option>1968</option><option>1969</option><option>1970</option>
      </select>
    </div>
    <div class="pfelt">
      <label>Særaldersgrense</label>
      <select id="saer">
        <option value="">Velg</option>
        <option value="60">60 år</option>
        <option value="65">65 år</option>
        <option value="ingen">Ingen</option>
      </select>
    </div>
  </div>

  <div class="sec-lbl">Beregnede alternativer</div>

  <div class="tab-row">
    <button class="tab-btn active" id="tab-1" onclick="byttTab(1)"><span class="tab-dot"></span><span id="tab-lbl-1">Alternativ 1</span></button>
    <button class="tab-btn"        id="tab-2" onclick="byttTab(2)"><span class="tab-dot"></span><span id="tab-lbl-2">Alternativ 2</span></button>
    <button class="tab-btn"        id="tab-3" onclick="byttTab(3)"><span class="tab-dot"></span><span id="tab-lbl-3">Alternativ 3</span></button>
  </div>

  <!-- Genererer de 3 panelene via JS for å unngå repetisjon -->
  <div id="panel-1" class="alt-panel active"></div>
  <div id="panel-2" class="alt-panel"></div>
  <div id="panel-3" class="alt-panel"></div>

  <div class="sec-lbl">Merknad (valgfritt)</div>
  <textarea id="merknad" placeholder="F.eks. anbefalt å vurdere utsatt uttak, avklart 85-årsregel, osv."
    style="width:100%;padding:12px 16px;border:1.5px solid var(--bdr);border-radius:9px;font-family:'Syne',sans-serif;font-size:.82rem;line-height:1.6;background:var(--wh);resize:vertical;min-height:68px;margin-bottom:16px;"></textarea>

  <button class="gen-btn" onclick="generer()">Generer e-posttekst →</button>

  <div id="epost-section">
    <div class="epost-box">
      <div class="epost-header">
        <div class="epost-header-title">Generert e-posttekst</div>
        <button class="copy-btn" id="copy-btn" onclick="kopier()">📋 Kopier</button>
      </div>
      <div class="epost-body" id="epost-tekst"></div>
    </div>
  </div>

</div>

<script>
var afpState = {1:null, 2:null, 3:null};

// ── BUILD PANELS ──────────────────────────────────────────────────────
function byggPanel(n) {
  var p = document.getElementById('panel-'+n);
  p.innerHTML =
    '<div class="alt-name-row">' +
      '<label>Beskrivelse av alternativet</label>' +
      '<input type="text" id="lbl-'+n+'" placeholder="F.eks. Uttak fra 62 år" oninput="oppdaterTab('+n+')">' +
    '</div>' +
    feltRad('Uttaksalder', 'Når tas pensjon ut?',
      '<input type="text" id="ua-'+n+'" class="txt-input" placeholder="F.eks. 62"> <span class="field-unit">år</span>') +
    numRad('paaslag-'+n, 'Påslagspensjon', 'Fra 01.01.2020, begge sektorer', n) +
    numRad('for2020-'+n, 'Alderspensjon opptjent før 2020', 'Beskyttet, gammel opptjening', n) +
    feltRad('Oppfyller AFP-vilkår?', 'Ny AFP 1963+ (KS-tariff)',
      '<div class="field-toggle">' +
        '<button class="toggle-btn" id="afp-ja-'+n+'"  onclick="toggleAfp('+n+',\'ja\')">Ja</button>' +
        '<button class="toggle-btn" id="afp-nei-'+n+'" onclick="toggleAfp('+n+',\'nei\')">Nei</button>' +
      '</div>') +
    '<div class="field-row" id="row-afp-'+n+'">' + numRadInner('afp-'+n, 'AFP Livsvarig', 'Livsvarig tillegg', n) + '</div>' +
    '<div class="field-row" id="row-bet-'+n+'" style="display:none">' + numRadInner('bet-'+n, 'Betinget tjenestepensjon', 'Alternativ til AFP', n) + '</div>' +
    numRad('saer-'+n, 'Særalderspåslag', 'Livsvarig tillegg, ny lov juni 2025', n) +
    numRad('ov-'+n,   'Overgangstillegg', 'Kun 1963–1970, ved uttak før 67', n) +
    '<div class="total-row">' +
      '<div class="total-lbl">Estimert samlet pensjon</div>' +
      '<div class="total-val" id="total-'+n+'">0 kr/år</div>' +
    '</div>';
}

function numRad(id, lbl, hint, n) {
  return '<div class="field-row">' + numRadInner(id, lbl, hint, n) + '</div>';
}
function numRadInner(id, lbl, hint, n) {
  return '<div class="field-lbl">' + lbl + '<div class="field-hint">' + hint + '</div></div>' +
         '<div class="field-input-wrap">' +
           '<input type="number" id="' + id + '" class="num-input" placeholder="0" oninput="oppdaterTotal('+n+')">' +
           '<span class="field-unit">kr/år</span>' +
         '</div>';
}
function feltRad(lbl, hint, innhold) {
  return '<div class="field-row">' +
    '<div class="field-lbl">' + lbl + '<div class="field-hint">' + hint + '</div></div>' +
    innhold + '</div>';
}

[1,2,3].forEach(byggPanel);

// ── TABS ──────────────────────────────────────────────────────────────
function byttTab(n) {
  [1,2,3].forEach(function(i) {
    document.getElementById('tab-'+i).classList.toggle('active', i===n);
    document.getElementById('panel-'+i).classList.toggle('active', i===n);
  });
}
function oppdaterTab(n) {
  var lbl = document.getElementById('lbl-'+n).value.trim();
  document.getElementById('tab-lbl-'+n).textContent = lbl || ('Alternativ '+n);
  var hasData = lbl || harData(n);
  document.getElementById('tab-'+n).classList.toggle('has-data', !!hasData);
}
function harData(n) {
  return ['paaslag','for2020','afp','bet','saer','ov'].some(function(f) {
    var el = document.getElementById(f+'-'+n);
    return el && parseFloat(el.value) > 0;
  });
}

// ── AFP TOGGLE ────────────────────────────────────────────────────────
function toggleAfp(n, val) {
  afpState[n] = val;
  document.getElementById('afp-ja-'+n).className  = 'toggle-btn'+(val==='ja' ?' active-ja':'');
  document.getElementById('afp-nei-'+n).className = 'toggle-btn'+(val==='nei'?' active-nei':'');
  document.getElementById('row-afp-'+n).style.display = val==='ja'  ? '' : 'none';
  document.getElementById('row-bet-'+n).style.display  = val==='nei' ? '' : 'none';
  oppdaterTotal(n);
}

// ── TOTAL ─────────────────────────────────────────────────────────────
function tv(id) { var v=parseFloat(document.getElementById(id).value); return isNaN(v)?0:v; }
function fmt(n) { return n===0?'0':Math.round(n).toLocaleString('nb-NO'); }

function oppdaterTotal(n) {
  var klp     = tv('paaslag-'+n) + tv('for2020-'+n);
  var afp     = afpState[n]==='ja'  ? tv('afp-'+n) :
                afpState[n]==='nei' ? tv('bet-'+n) : 0;
  var tillegg = tv('saer-'+n) + tv('ov-'+n);
  document.getElementById('total-'+n).textContent = fmt(klp+afp+tillegg) + ' kr/år';
  oppdaterTab(n);
}

// ── GENERER ───────────────────────────────────────────────────────────
function generer() {
  var fornavn = document.getElementById('fornavn').value.trim() || 'deg';
  var aar     = document.getElementById('aar').value;
  var saer    = document.getElementById('saer').value;
  var merknad = document.getElementById('merknad').value.trim();
  var saerLbl = {'60':'Særalder 60 år','65':'Særalder 65 år','ingen':'Ingen særaldersgrense'};
  var S = 'font-family:Segoe UI,sans-serif;font-size:11px;color:#111827;';

  var alts = [];
  [1,2,3].forEach(function(n) {
    var lbl  = document.getElementById('lbl-'+n).value.trim() || ('Alternativ '+n);
    var ua   = document.getElementById('ua-'+n).value.trim();
    var p    = tv('paaslag-'+n), f2 = tv('for2020-'+n);
    var afpB = afpState[n]==='ja'  ? tv('afp-'+n) : 0;
    var betB = afpState[n]==='nei' ? tv('bet-'+n) : 0;
    var sB   = tv('saer-'+n), oB = tv('ov-'+n);
    var tot  = p+f2+afpB+betB+sB+oB;
    if (tot===0 && !ua) return;
    var rader=[];
    if(p>0)   rader.push(['Påslagspensjon', fmt(p)]);
    if(f2>0)  rader.push(['Alderspensjon opptjent før 2020', fmt(f2)]);
    if(afpState[n]==='ja'  && afpB>0) rader.push(['AFP Livsvarig', fmt(afpB)]);
    if(afpState[n]==='nei' && betB>0) rader.push(['Betinget tjenestepensjon', fmt(betB)]);
    if(sB>0)  rader.push(['Særalderspåslag', fmt(sB)]);
    if(oB>0)  rader.push(['Overgangstillegg', fmt(oB)]);
    alts.push({lbl:lbl, ua:ua, rader:rader, tot:tot});
  });

  var profilBiter=[];
  if(aar) profilBiter.push('Født '+aar);
  if(saer&&saerLbl[saer]) profilBiter.push(saerLbl[saer]);

  var innledning = 'Tusen takk for hyggelig telefonsamtale! Her er en oppsummering av alternativene vi gikk gjennom og beregnet i dag:';

  // HTML
  var html = '<span style="'+S+'font-weight:600">Hei '+fornavn+',</span>\n\n';
  html += '<span style="'+S+'">'+innledning+'</span>\n';

  alts.forEach(function(a) {
    var tittel = a.lbl + (a.ua ? ' — uttak fra '+a.ua+' år' : '');
    html += '\n<span style="'+S+'font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#6b7280;">'+tittel+'</span>\n';
    a.rader.forEach(function(r) {
      html += '<span style="'+S+'display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f0ede6;">' +
              '<span>'+r[0]+'</span><span style="font-weight:700">'+r[1]+' kr/år</span></span>';
    });
    html += '<span style="'+S+'display:flex;justify-content:space-between;padding:7px 0;border-top:2px solid #1a5c3a;margin-top:3px;">' +
            '<span style="font-weight:700;color:#1a5c3a;">Estimert samlet pensjon</span>' +
            '<span style="font-weight:700;color:#1a5c3a;">'+fmt(a.tot)+' kr/år'+
            ' <span style="font-weight:400;color:#6b7280;">('+fmt(Math.round(a.tot/12))+' kr/mnd)</span></span></span>\n';
  });

  if(profilBiter.length>0) html+='\n<span style="'+S+'color:#6b7280;">Grunnlag: '+profilBiter.join(', ')+'.</span>\n';
  html+='\n<span style="'+S+'color:#6b7280;">Merk at dette er veiledende beregninger. For offisiell beregning, bruk pensjonskalkulator på Min side (klp.no).</span>\n';
  if(merknad) html+='\n<span style="'+S+'">'+merknad+'</span>\n';
  html+='\n<span style="'+S+'">Ta gjerne kontakt igjen dersom du har spørsmål.</span>\n\n<span style="'+S+'font-weight:600">Med vennlig hilsen</span>';

  document.getElementById('epost-tekst').innerHTML = html;

  // Ren tekst
  var linjer=['Hei '+fornavn+',','',innledning];
  alts.forEach(function(a) {
    linjer.push('');
    linjer.push((a.lbl+(a.ua?' — uttak fra '+a.ua+' år':'')).toUpperCase());
    a.rader.forEach(function(r){linjer.push(r[0]+': '+r[1]+' kr/år');});
    linjer.push('Estimert samlet pensjon: '+fmt(a.tot)+' kr/år ('+fmt(Math.round(a.tot/12))+' kr/mnd)');
  });
  if(profilBiter.length>0){linjer.push('');linjer.push('Grunnlag: '+profilBiter.join(', ')+'.');}
  linjer.push('','Merk at dette er veiledende beregninger. For offisiell beregning, bruk pensjonskalkulator på Min side (klp.no).');
  if(merknad){linjer.push('');linjer.push(merknad);}
  linjer.push('','Ta gjerne kontakt igjen dersom du har spørsmål.','','Med vennlig hilsen');

  document.getElementById('epost-tekst').dataset.plaintext = linjer.join('\n');
  document.getElementById('epost-section').style.display='block';
  document.getElementById('epost-section').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── KOPIER ────────────────────────────────────────────────────────────
function kopier() {
  var el=document.getElementById('epost-tekst');
  var tekst=el.dataset.plaintext||el.innerText;
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(tekst).then(kopierBekreft).catch(function(){kopierFallback(tekst);});
  } else { kopierFallback(tekst); }
}
function kopierFallback(tekst) {
  var ta=document.createElement('textarea');
  ta.value=tekst;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');kopierBekreft();}
  catch(e){alert('Merk teksten og trykk Ctrl+C.');}
  document.body.removeChild(ta);
}
function kopierBekreft() {
  var btn=document.getElementById('copy-btn');
  btn.textContent='✓ Kopiert!';
  setTimeout(function(){btn.textContent='📋 Kopier';},2500);
}

// ── NULLSTILL ─────────────────────────────────────────────────────────
function nullstill() {
  [1,2,3].forEach(function(n) {
    ['paaslag','for2020','afp','bet','saer','ov'].forEach(function(f){
      var el=document.getElementById(f+'-'+n);if(el)el.value='';
    });
    document.getElementById('lbl-'+n).value='';
    document.getElementById('ua-'+n).value='';
    afpState[n]=null;
    document.getElementById('afp-ja-'+n).className='toggle-btn';
    document.getElementById('afp-nei-'+n).className='toggle-btn';
    document.getElementById('row-afp-'+n).style.display='';
    document.getElementById('row-bet-'+n).style.display='none';
    document.getElementById('total-'+n).textContent='0 kr/år';
    document.getElementById('tab-'+n).className='tab-btn'+(n===1?' active':'');
    document.getElementById('tab-lbl-'+n).textContent='Alternativ '+n;
  });
  ['fornavn','merknad'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('aar').value='';
  document.getElementById('saer').value='';
  document.getElementById('epost-section').style.display='none';
  document.getElementById('panel-1').classList.add('active');
  document.getElementById('panel-2').classList.remove('active');
  document.getElementById('panel-3').classList.remove('active');
}
</script>
</body>
</html>
